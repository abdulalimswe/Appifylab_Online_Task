services:
  postgres:
    image: postgres:16
    container_name: appifylab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: appifylab_social
      POSTGRES_USER: root
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - appifylab_postgres_data:/var/lib/postgresql/data

volumes:
  appifylab_postgres_data:
