services:
  postgres:
    image: postgres:16
    container_name: appifylab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appifylab_social}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - appifylab_postgres_data:/var/lib/postgresql/data

volumes:
  appifylab_postgres_data:
