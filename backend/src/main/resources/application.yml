server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: social-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appifylab_social}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  security:
    jwt-secret: ${JWT_SECRET:}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cloudinary:
    # Required: exact "Cloud name" from Cloudinary Console -> Dashboard (top) or Settings -> API Keys.
    # No default - wrong names cause: Invalid cloud_name <name>
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:appifylab/posts}

logging:
  level:
    org.springframework.security: INFO
