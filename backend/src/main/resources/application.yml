server:
  port: 8080

spring:
  application:
    name: social-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appifylab_social}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:REDACTED_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  security:
    jwt-secret: ${JWT_SECRET:REDACTED_JWT_SECRET}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    org.springframework.security: INFO

